---
- name: Install Receptor from AWX install bundle
  hosts: all
  become: yes
  gather_facts: false

  vars:
    # AWX API
    awx_api_host: ""
    awx_api_url: "https://{{ awx_api_host }}/api/v2"
    awx_token: ""

    # Receptor
    download_dir: "/tmp/awx_bundle"
    receptor_dir: "/etc/receptor"

    # Variabili personalizzabili
    awx_instance_hostname: ""
    awx_instance_group_name: ""
    awx_instance_listener_port: 27199
    awx_instance_enabled: true
    awx_instance_managed_by_policy: true
    awx_instance_peers_from_control_nodes: true

  tasks:
    - name: Create new execution instance
      ansible.builtin.uri:
        url: "{{ awx_api_url }}/instances/"
        method: POST
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          hostname: "{{ awx_instance_hostname }}"
          node_type: execution
          awx_instance_listener_port: "{{ awx_instance_listener_port }}"
          awx_instance_enabled: "{{ awx_instance_enabled }}"
          awx_instance_managed_by_policy: "{{ awx_instance_managed_by_policy }}"
          awx_instance_peers_from_control_nodes: "{{ awx_instance_peers_from_control_nodes }}"
      register: create_instance
      failed_when: create_instance.status not in [200, 201]

    - name: Retrieve instance ID from AWX
      ansible.builtin.uri:
        url: "{{ awx_api_url }}/instances/"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
        validate_certs: no
      register: instances_list

    - name: Set instance_id fact
      ansible.builtin.set_fact:
        instance_id: "{{ instances_list.json.results | selectattr('hostname', 'equalto', awx_instance_hostname) | map(attribute='id') | first }}"

    - name: Create Instance Group
      ansible.builtin.uri:
        url: "{{ awx_api_url }}/instance_groups/"
        method: POST
        headers:
          Authorization: "Bearer {{ awx_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ awx_instance_group_name }}"
      register: create_instance_group
      failed_when: create_instance_group.status not in [200, 201]

    - name: Get Instance Group ID
      ansible.builtin.uri:
        url: "{{ awx_api_url }}/instance_groups/"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
        validate_certs: no
      register: instance_groups_list

    - name: Set instance_group_id fact
      ansible.builtin.set_fact:
        instance_group_id: "{{ instance_groups_list.json.results | selectattr('name','equalto',awx_instance_group_name) | map(attribute='id') | first }}"

    - name: Associate instance to Instance Group (via curl)
      ansible.builtin.command: >
        curl --location '{{ awx_api_url }}/instance_groups/{{ instance_group_id }}/instances/' 
             --header 'Authorization: Bearer {{ awx_token }}' 
             --header 'Content-Type: application/json' 
             --data '{"id": {{ instance_id | int }}}'
      register: curl_output
      changed_when: curl_output.rc == 0
      failed_when: curl_output.rc != 0
    
    - name: Set bundle_subdir based on instance hostname
      ansible.builtin.set_fact:
        bundle_subdir: "{{ awx_instance_hostname }}_install_bundle"

    - name: Download install bundle
      ansible.builtin.uri:
        url: "https://{{ awx_api_host }}/api/v2/instances/{{ awx_instance_hostname }}/install_bundle"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
        validate_certs: no
        return_content: yes
      register: install_bundle_content

    - name: Ensure temporary download directory exists
      ansible.builtin.file:
        path: "{{ download_dir }}"
        state: directory
        mode: '0755'

    - name: Save install bundle locally
      ansible.builtin.copy:
        content: "{{ install_bundle_content.content }}"
        dest: "{{ download_dir }}/bundle.tar.gz"
        mode: '0644'

    - name: Install additional packages for receptor
      ansible.builtin.apt:
        name:
          - podman
          - receptor
          - python3-ansible-runner
        state: present
        update_cache: yes
        
    - name: Ensure required packages for extraction are installed
      ansible.builtin.package:
        name:
          - tar
          - gzip
          - bzip2
          - xz-utils
          - unzip
          - software-properties-common
        state: present
        update_cache: yes

    - name: Extract the bundle
      ansible.builtin.command:
        cmd: "tar -xf {{ download_dir }}/bundle.tar.gz -C {{ download_dir }}"
      register: extract_result
      failed_when: extract_result.rc != 0

    - name: Enable required services
      ansible.builtin.systemd:
        name: "{{ item }}"
        awx_instance_enabled: yes
      loop:
        - podman
        - receptor

    - name: Deploy receptor.conf
      ansible.builtin.copy:
        dest: /etc/receptor/receptor.conf
        mode: '0644'
        content: |
          ---
          - node:
              id: {{ awx_instance_hostname }}

          - log-level: debug

          - control-service:
              service: control
              filename: /tmp/receptor.sock
              permissions: 0660
              tls: tls_server

          - tls-server:
              name: tls_server
              cert: /etc/receptor/certs/receptor.crt
              key: /etc/receptor/certs/receptor.key
              clientcas: /etc/receptor/ca/ca.crt
              skipreceptornamescheck: true
              requireclientcert: true
              mintls13: true

          - tls-client:
              name: tls_client
              cert: /etc/receptor/certs/receptor.crt
              key: /etc/receptor/certs/receptor.key
              rootcas: /etc/receptor/ca/ca.crt
              skipreceptornamescheck: true
              mintls13: true

          - tcp-listener:
              port: {{ awx_instance_listener_port }}
              tls: tls_server

          - work-command:
              worktype: ansible-runner
              command: ansible-runner
              params: worker
              allowruntimeparams: true
              verifysignature: true

          - work-verification:
              publickey: /etc/receptor/public_key/work_public_key.pem

    - name: Ensure receptor subdirectories exist
      ansible.builtin.file:
        path: "{{ receptor_dir }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - certs
        - ca
        - public_key

    - name: Copy receptor TLS and key files
      ansible.builtin.copy:
        src: "{{ download_dir }}/{{ bundle_subdir }}/receptor/tls/{{ item.src }}"
        dest: "{{ receptor_dir }}/{{ item.dest }}"
        remote_src: yes
        mode: '0644'
      loop:
        - { src: 'receptor.crt', dest: 'certs/receptor.crt' }
        - { src: 'receptor.key', dest: 'certs/receptor.key' }
        - { src: 'ca/mesh-CA.crt', dest: 'ca/ca.crt' }

    - name: Copy receptor public key
      ansible.builtin.copy:
        src: "{{ download_dir }}/{{ bundle_subdir }}/receptor/work_public_key.pem"
        dest: "{{ receptor_dir }}/public_key/work_public_key.pem"
        remote_src: yes
        mode: '0644'

    - name: Restart receptor service
      ansible.builtin.systemd:
        name: receptor
        state: restarted

    - name: Check receptor service status
      ansible.builtin.systemd:
        name: receptor
      register: receptor_status

    - name: Fail if receptor service is not active
      ansible.builtin.fail:
        msg: "Receptor service is not active!"
      when: receptor_status.status.ActiveState != "active"

    - name: Clean up temporary AWX bundle directory
      ansible.builtin.file:
        path: "{{ download_dir }}"
        state: absent