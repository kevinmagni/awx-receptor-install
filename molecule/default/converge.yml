---
- name: Converge
  hosts: all
  gather_facts: true

  tasks:
    - name: Test that validation rejects empty required vars
      block:
        - name: Run role with empty vars (should fail)
          ansible.builtin.include_role:
            name: awx-receptor-install
          vars:
            awx_receptor_api_host: ""
            awx_receptor_api_token: ""
            awx_receptor_instance_hostname: ""
            awx_receptor_instance_group_name: ""

        - name: Fail if validation did not reject empty vars
          ansible.builtin.fail:
            msg: "Variable validation should have failed with empty required vars"

      rescue:
        - name: Confirm validation worked
          ansible.builtin.debug:
            msg: "Variable validation correctly rejected empty required vars"
