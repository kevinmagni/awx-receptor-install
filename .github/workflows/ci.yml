---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python and create venv
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv pip install --python .venv ansible-core ansible-lint yamllint

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        distro:
          - geerlingguy/docker-ubuntu2204-ansible
          - geerlingguy/docker-ubuntu2404-ansible
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python and create venv
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv pip install --python .venv ansible-core molecule "molecule-plugins[docker]" docker

      - name: Run Molecule
        run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
